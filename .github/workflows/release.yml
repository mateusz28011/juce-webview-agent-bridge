name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major
      retry_version:
        description: Existing version to publish to npm after a partial release (for example 0.3.0); normally leave blank
        required: false
        default: ''
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  publish:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify the tested commit is still main
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git switch -C main "$GITHUB_SHA"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use an npm CLI with trusted-publishing support
        run: npm install --global npm@^11.5.1

      - name: Configure release author
        if: inputs.retry_version == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check out the existing release for an npm retry
        if: inputs.retry_version != ''
        env:
          RELEASE_VERSION: ${{ inputs.retry_version }}
        run: |
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          tag="v${RELEASE_VERSION}"
          git fetch origin "refs/tags/${tag}:refs/tags/${tag}"
          git merge-base --is-ancestor "${tag}^{}" origin/main
          git switch --detach "$tag"
          test "$(node -p "require('./package.json').version")" = "$RELEASE_VERSION"

      - name: Install dependencies for an npm retry
        if: inputs.retry_version != ''
        run: npm ci --ignore-scripts

      - name: Release GitHub and npm
        if: inputs.retry_version == ''
        run: npm run release -- "${{ inputs.bump }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Retry npm publish
        if: inputs.retry_version != ''
        run: npm publish --access public
