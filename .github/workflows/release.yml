name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  publish:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: write
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify the tested commit is still main
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git switch -C main "$GITHUB_SHA"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use an npm CLI with trusted-publishing support
        run: npm install --global npm@^11.5.1

      - name: Configure release author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release GitHub and npm with bootstrap token
        if: env.NPM_TOKEN != ''
        run: npm run release -- "${{ inputs.bump }}"
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Release GitHub and npm with trusted publishing
        if: env.NPM_TOKEN == ''
        run: npm run release -- "${{ inputs.bump }}"
        env:
          GH_TOKEN: ${{ github.token }}
